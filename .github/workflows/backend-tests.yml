name: Backend Tests and Coverage

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # Latest version

      - name: Set up JDK 21
        uses: actions/setup-java@v4 # Latest version
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache Maven Dependencies
        uses: actions/cache@v4 # Latest version
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Run Tests with JaCoCo Coverage
        run: mvn clean verify

      - name: Upload JaCoCo Coverage to Codecov
        uses: codecov/codecov-action@v4 # Latest version
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: target/site/jacoco/jacoco.xml
          fail_ci_if_error: true
          verbose: true

      - name: Upload Coverage Report as Artifact
        uses: actions/upload-artifact@v4 # Latest version
        with:
          name: jacoco-report
          path: target/site/jacoco/
